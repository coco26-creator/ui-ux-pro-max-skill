# Continue - bundles its own data/scripts

output: ".continue/skills/ui-ux-pro-max"

files:
  - from: source/data
    to: data
    type: copy

  - from: source/scripts
    to: scripts
    type: copy

  - from: source/skill.md
    to: SKILL.md
    type: template
    vars:
      script_path: ".continue/skills/ui-ux-pro-max/scripts/search.py"
